# DAM Platform — local infrastructure plane.
# Brings up the four stateful stores from the Technical Solution Architecture:
#   Postgres+pgvector (system of record) · Qdrant (vectors) · OpenSearch (BM25)
#   Redis (queue) · MinIO (object storage).
# Named volumes keep data small & reliable on the WSL2 disk; model weights live
# on E:\ via HF_HOME (see .env), not here.
#
#   docker compose up -d            # start infra
#   docker compose ps               # status
#   docker compose down             # stop (keeps volumes)
#   docker compose down -v          # stop + wipe data

name: dam-platform

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dam}
      POSTGRES_USER: ${POSTGRES_USER:-dam}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dam_dev_pw}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dam} -d ${POSTGRES_DB:-dam}"]
      interval: 5s
      timeout: 5s
      retries: 20

  qdrant:
    image: qdrant/qdrant:v1.12.4
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST
      - "6334:6334"   # gRPC
    volumes:
      - qdrantdata:/qdrant/storage
    # No healthcheck: the qdrant image ships neither curl nor bash. The API/worker
    # retry against it on startup instead.

  opensearch:
    image: opensearchproject/opensearch:2.18.0
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }
    ports:
      - "9200:9200"
    volumes:
      - osdata:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # console
    volumes:
      - miniodata:/data

  # One-shot: wait for MinIO, create the assets bucket, then exit.
  # (The API also ensures the bucket on startup, so this is belt-and-suspenders.)
  minio-init:
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-minioadmin} ${S3_SECRET_KEY:-minioadmin}; do echo 'waiting for minio...'; sleep 2; done &&
      mc mb --ignore-existing local/${S3_BUCKET:-dam-assets} &&
      echo 'bucket ready' "
    restart: "no"

volumes:
  pgdata:
  qdrantdata:
  osdata:
  redisdata:
  miniodata:
